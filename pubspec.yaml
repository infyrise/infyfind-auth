name: infyfind_auth
description: A new Flutter package project.
version: 0.0.1
homepage: null

environment:
  sdk: ">=3.10.7 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.9.2

  # Storage
  shared_preferences: ^2.5.5

  # UI
  lottie: ^3.3.3

  # Device info
  device_info_plus: ^12.3.0

  # App info
  package_info_plus: ^9.0.0
  # Location
  geolocator: ^14.0.2
  pin_code_fields: ^8.0.1
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700